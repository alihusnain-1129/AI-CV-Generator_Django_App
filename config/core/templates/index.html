<!-- templates/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI CV Generator</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background: #f5f5f5; }
        textarea { width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #ccc; }
        button { margin-top: 10px; padding: 10px 20px; border-radius: 5px; border: none; background-color: #4CAF50; color: white; cursor: pointer; }
        button:hover { background-color: #45a049; }
        pre { background: #fff; padding: 15px; border-radius: 5px; white-space: pre-wrap; word-wrap: break-word; }
    </style>
</head>
<body>
    <h1>AI CV Generator</h1>

    <form method="POST">
        {% csrf_token %}
        <textarea name="input_text" rows="10" placeholder="Paste your CV or experience here..."></textarea>
        <br>
        <button type="submit">Generate CV</button>
    </form>

    {% if cv_output %}
        <h2>Generated CV</h2>
        <pre>{{ cv_output }}</pre>
    {% endif %}
</body>
</html>
